<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="new.css">
</head>

<body>

    <form action="#">
        <div class="container" >

            <h1>Registration Form</h1>

            <label for="name"> First Name:</label><br>
            <input type="text" id="name" class="x" name="name"> <br>


            <label for="last"> Last Name:</label><br>
            <input type="text" id="last" class="x"><br>

            <label for="email"> Email</label><br>
            <input type="email" id="email" class="x"><br>

            <label for="pass">Password</label><br>
            <input type="password" id="pass" class="x"><br>

            <label for="Repass">Re-type password</label><br>
            <input type="password" id="Repass" class="x"><br>

            <label for="no">Phone Number</label><br>
            <input type="number" id="no" class="x"><br>

            <label for="gender">Gender:</label><br>
            <select name="gender" id="gender" class="x">

                <option value="male" selected>Male</option>
                <option value="female" >Female</option>
                <option value="others">Others</option>

            </select><br>

            <button type="submit" id="btn">Submit</button>
 </div>
    </form>

</body>

</html>
